
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ── Improved background & base ── */
html, body { background: #F0F2F7; }
body{font-family:var(--font-sans); background:#F0F2F7; min-height:100vh;}
.root{padding:1.25rem; background:#F0F2F7;}

/* ── Tabs ── */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.tab{padding:7px 16px;border-radius:8px;border:1px solid #D1D5DB;font-size:13px;cursor:pointer;background:#fff;color:#555;transition:all .15s;font-weight:400}
.tab.active{background:#1e293b;color:#fff;border-color:#1e293b;font-weight:500;box-shadow:0 2px 6px rgba(30,41,59,.25)}
.tab:hover:not(.active){background:#f8f9fc;border-color:#aaa}
.panel{display:none}.panel.active{display:block}

/* ── Stat cards ── */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:1.5rem}
.stat-card{padding:14px;border-radius:12px;background:#fff;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid #E5E7EB}
.stat-num{font-size:28px;font-weight:600;color:#1e293b}
.stat-lbl{font-size:12px;color:#6B7280;margin-top:4px}

/* ── BC grid ── */
.bc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}

/* ── BC card ── */
.bc-card{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  border:1px solid #E5E7EB;
  transition:box-shadow .2s;
}
.bc-card:hover{box-shadow:0 4px 18px rgba(0,0,0,.13)}

.bc-header{padding:12px 16px;display:flex;align-items:center;gap:10px}
.bc-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 3px rgba(0,0,0,.08)}
.bc-title{font-size:14px;font-weight:600;color:#1e293b}
.bc-sub{font-size:12px;color:#64748B;margin-top:2px;font-style:italic}
.bc-body{padding:12px 16px;border-top:1px solid #F1F5F9}

/* ── Module box wrapper ── */
.mod-box{
  border-radius:10px;
  border:1px solid #E2E8F0;
  overflow:hidden;
  margin-bottom:0;
}
.mod-box-header{
  padding:6px 10px;
  font-size:10px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.6px;
  color:#64748B;
  background:#F8FAFC;
  border-bottom:1px solid #E2E8F0;
}
.mod-list{display:flex;flex-direction:column;gap:0}

/* ── Module items ── */
.mod-item{
  display:flex;
  align-items:flex-start;
  gap:10px;
  padding:8px 10px;
  border-bottom:1px solid #F1F5F9;
  background:#fff;
  transition:background .12s;
}
.mod-item:last-child{border-bottom:none}
.mod-item:hover{background:#FAFBFF}
.mod-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.mod-content{flex:1;min-width:0}
.mod-name{font-size:12px;font-weight:600;margin-bottom:2px}
.mod-desc{font-size:11.5px;color:#64748B;line-height:1.45}

/* ── Entities ── */
.entities-section{margin-top:12px;padding-top:10px;border-top:1px solid #F1F5F9}
.entities-label{font-size:10px;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:600}
.entity-chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid #E2E8F0;color:#475569;background:#F8FAFC;font-weight:500}

/* ── Context map ── */
.map-svg{width:100%;border-radius:12px;background:#fff;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}

/* ── Integration table ── */
.int-table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.int-table th{text-align:left;padding:10px 12px;font-size:12px;font-weight:600;color:#fff;background:#1e293b}
.int-table td{padding:9px 12px;border-bottom:1px solid #F1F5F9;vertical-align:top;color:#374151}
.int-table tr:last-child td{border-bottom:none}
.int-table tbody tr:hover td{background:#F8FAFC}
.pattern-badge{display:inline-block;font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600}
</style>

<div class="root">
<div class="tabs">
  <button class="tab active" onclick="show('bcs')">Bounded Contexts</button>
  <button class="tab" onclick="show('map')">Context Map</button>
  <button class="tab" onclick="show('integrations')">Integration Patterns</button>
</div>

    <!-- Notification - bottom center -->
    <g>
      <rect x="248" y="350" width="185" height="64" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>

      <text x="340" y="392" text-anchor="middle" font-size="11" fill="#993C1D">WebSocket · APNs · FCM</text>

    <g>

<div id="integrations" class="panel">
  <table class="int-table">
    <thead>
      <tr>
        <th>From</th><th>To</th><th>Integration</th><th>Pattern</th><th>Data / Event</th>
      </tr>
    </thead>
    <tbody id="int-body"></tbody>
  </table>
</div>

</div>

<script>
const BCS = [
  {
    id:'iam', name:'Identity & Access', color:'#534AB7', bg:'#EEEDFE',
    subtitle:'Shared kernel — upstream for all contexts',
    modules:[
      {name:'AuthModule', desc:'JWT issuance, OAuth (Google, Apple), token refresh, session'},
      {name:'UserModule', desc:'Profile management for all roles: Customer, Restaurant, Shipper, Admin'},
      {name:'ApprovalModule', desc:'Admin workflow for verifying and approving Restaurant/Shipper registrations'},
      {name:'RBACModule', desc:'Role-based guards, permission resolution across contexts'},
    ],
    entities:['User','Session','OAuthAccount','ApprovalRequest','Role','Permission']
  },
  {
    id:'restaurant', name:'Restaurant & Catalog', color:'#0F6E56', bg:'#E1F5EE',
    subtitle:'Upstream to Ordering — manages supply side',
    modules:[
      {name:'RestaurantModule', desc:'Restaurant profile, operating hours, service radius, open/close toggle'},
      {name:'MenuModule', desc:'Categories, MenuItems, price management, sold-out toggle'},
      {name:'SearchModule', desc:'Restaurant discovery by name, category, proximity (geo-radius)'},
    ],
    entities:['Restaurant','MenuCategory','MenuItem','OperatingHours','ServiceZone']
  },
  {
    id:'ordering', name:'Ordering', color:'#185FA5', bg:'#E6F1FB',
    subtitle:'Core domain — orchestrates the full order lifecycle',
    modules:[
      {name:'CartModule', desc:'Cart creation, add/remove items (single-restaurant enforcement), cart persistence (Redis)'},
      {name:'OrderModule', desc:'Order placement, address validation, COD checkout, order entity creation'},
      {name:'OrderLifecycleModule', desc:'State machine: PENDING→PAID→CONFIRMED→PREPARING→READY_FOR_PICKUP→PICKED_UP→DELIVERING→DELIVERED→CANCELLED/REFUNDED'},
      {name:'OrderHistoryModule', desc:'Query past orders for Customer, Restaurant, and Shipper views'},
    ],
    entities:['Order','OrderItem','Cart','CartItem','DeliveryAddress','OrderStatusLog']
  },
  {
    id:'delivery', name:'Delivery', color:'#854F0B', bg:'#FAEEDA',
    subtitle:'Manages shipper side and real-time dispatch',
    modules:[
      {name:'ShipperModule', desc:'Shipper profile, online/offline availability toggle, earnings history'},
      {name:'DispatchModule', desc:'Assign orders to available shippers, notify eligible shippers in zone'},
      {name:'LocationModule', desc:'Real-time shipper GPS ingestion (Redis), location updates via WebSocket'},
    ],
    entities:['ShipperProfile','DispatchRequest','ShipperLocation','DeliveryAssignment']
  },
  {
    id:'payment', name:'Payment', color:'#3B6D11', bg:'#EAF3DE',
    subtitle:'Handles COD (MVP) and online gateway integration',
    modules:[
      {name:'CODModule', desc:'Cash on Delivery workflow: record expected collection, mark collected on delivery'},
      {name:'GatewayModule', desc:'VNPay / MoMo integration (deferred to Release 2), sandbox testing'},
      {name:'RefundModule', desc:'Trigger refund on order cancellation, reconcile with payment record'},
      {name:'CommissionModule', desc:'Calculate platform commission (% of GMV) per restaurant per period'},
    ],
    entities:['PaymentRecord','Transaction','Refund','CommissionEntry']
  },
  {
    id:'notification', name:'Notification', color:'#993C1D', bg:'#FAECE7',
    subtitle:'Push + real-time — consumes events from other BCs',
    modules:[
      {name:'PushModule', desc:'APNs (iOS) and FCM (Android) device token management and message dispatch'},
      {name:'WebSocketModule', desc:'Socket.io namespace management, room-based order status broadcasting'},
      {name:'NotificationTemplateModule', desc:'Message templates for each order status transition per actor role'},
    ],
    entities:['DeviceToken','NotificationLog','WebSocketRoom','NotificationTemplate']
  },
  {
    id:'analytics', name:'Analytics & Reporting', color:'#5F5E5A', bg:'#F1EFE8',
    subtitle:'Admin-only read-side — aggregates from other contexts',
    modules:[
      {name:'DashboardModule', desc:'KPI summary: orders today, active restaurants, active shippers'},
      {name:'OrderReportModule', desc:'Daily/weekly order volume, completion rate, avg delivery time'},
      {name:'FinancialReportModule', desc:'GMV per restaurant, platform commission, COD reconciliation'},
      {name:'UserReportModule', desc:'Registration volume, pending approvals, approval status breakdown'},
    ],
    entities:['DailyOrderSummary','RestaurantRevenueSummary','UserRegistrationReport']
  },
];

const INTEGRATIONS = [
  {from:'Ordering', to:'Restaurant & Catalog', pattern:'Domain Service Call', data:'Validate restaurant open, item availability on checkout'},
  {from:'Ordering', to:'Payment', pattern:'Domain Event', data:'OrderPlaced → trigger COD record / gateway charge'},
  {from:'Ordering', to:'Notification', pattern:'Domain Event', data:'OrderStatusChanged → broadcast to all actors'},
  {from:'Ordering', to:'Delivery', pattern:'Domain Event', data:'OrderReadyForPickup → dispatch to available shippers'},
  {from:'Delivery', to:'Notification', pattern:'Domain Event', data:'ShipperLocationUpdated, ShipperPickedUp'},
  {from:'Payment', to:'Ordering', pattern:'Domain Event', data:'PaymentConfirmed → advance order to CONFIRMED state'},
  {from:'Payment', to:'Analytics', pattern:'Read-side query', data:'CommissionEntry → FinancialReportModule aggregation'},
  {from:'Ordering', to:'Analytics', pattern:'Read-side query', data:'OrderStatusLog → DailyOrderSummary projection'},
  {from:'IAM', to:'All Contexts', pattern:'Shared Kernel', data:'User identity, roles, JWT claims resolved at API gateway'},
  {from:'Restaurant & Catalog', to:'Ordering', pattern:'Anti-corruption Layer', data:'MenuItem snapshot stored in OrderItem (price isolation)'},
];

function show(id) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById(id).classList.add('active');
}

function renderBCs() {
  const moduleIcons = ['⚙️','📦','🔍','🛒','📋','🔄','📜','🚚','📡','📍','💵','🏦','↩️','💰','🔔','📲','📄','📊','📈','💹','👤'];
  const grid = document.getElementById('bc-grid');
  grid.innerHTML = BCS.map(bc=>`
    <div class="bc-card">
      <div class="bc-header" style="background:${bc.bg}">
        <div class="bc-dot" style="background:${bc.color}"></div>
        <div>
          <div class="bc-title">${bc.name}</div>
          <div class="bc-sub">${bc.subtitle}</div>
        </div>
      </div>
      <div class="bc-body">
        <div class="mod-box">
          <div class="mod-box-header" style="color:${bc.color};border-bottom-color:${bc.color}22;background:${bc.bg}55">
            Modules (${bc.modules.length})
          </div>
          <div class="mod-list">
            ${bc.modules.map((m,i)=>`
              <div class="mod-item">
                <div class="mod-content">
                  <div class="mod-name" style="color:${bc.color}">${m.name}</div>
                  <div class="mod-desc">${m.desc}</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="entities-section">
          <div class="entities-label">Domain Entities</div>
          <div class="entity-chips">
            ${bc.entities.map(e=>`<span class="chip" style="border-color:${bc.color}33;color:${bc.color}">${e}</span>`).join('')}
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderIntegrations() {
  const patternColors = {
    'Domain Event':'background:#E6F1FB;color:#185FA5',
    'Domain Service Call':'background:#E1F5EE;color:#0F6E56',
    'Shared Kernel':'background:#EEEDFE;color:#534AB7',
    'Read-side query':'background:#F1EFE8;color:#5F5E5A',
    'Anti-corruption Layer':'background:#FAEEDA;color:#854F0B',
  };
  document.getElementById('int-body').innerHTML = INTEGRATIONS.map(i=>`
    <tr>
      <td style="font-size:12px;font-weight:500;color:var(--color-text-primary)">${i.from}</td>
      <td style="font-size:12px;color:var(--color-text-secondary)">${i.to}</td>
      <td><span class="pattern-badge" style="${patternColors[i.pattern]||''}">${i.pattern}</span></td>
      <td style="font-size:12px;color:var(--color-text-secondary)">${i.data}</td>
    </tr>
  `).join('');
}

renderBCs();
renderIntegrations();
</script>
