services:
  postgres:
    image: postgres:18
    container_name: todo_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - food_order_db:/var/lib/postgresql
    restart: unless-stopped

volumes:
  food_order_db:
    driver: local
